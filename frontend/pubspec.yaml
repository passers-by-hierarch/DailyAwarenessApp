name: daily_awareness
description: Daily Awareness App - 个人记忆问答与日常管理助手

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # 状态管理
  flutter_riverpod: ^2.4.9
  riverpod_annotation: ^2.3.3
  
  # 网络请求
  dio: ^5.4.0
  retrofit: ^4.0.3
  
  # 数据序列化
  json_annotation: ^4.8.1
  freezed_annotation: ^2.4.1
  
  # 本地存储
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  flutter_secure_storage: ^9.0.0
  sqflite: ^2.3.0
  path: ^1.8.3
  
  # UI组件
  flutter_slidable: ^3.0.1
  shimmer: ^3.0.0
  fluttertoast: ^8.2.4
  
  # 工具
  intl: ^0.18.1
  uuid: ^4.2.1
  equatable: ^2.0.5
  
  # 语音
  speech_to_text: ^6.5.1
  flutter_tts: ^3.8.5
  permission_handler: ^11.1.0
  
  # 通知
  flutter_local_notifications: ^16.3.0
  timezone: ^0.9.2
  
  # 其他
  connectivity_plus: ^5.0.2
  share_plus: ^7.2.1
  url_launcher: ^6.2.2
  image_picker: ^1.0.7
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  build_runner: ^2.4.7
  json_serializable: ^6.7.1
  freezed: ^2.4.5
  retrofit_generator: ^8.0.6
  hive_generator: ^2.0.1
  custom_lint: ^0.5.7
  riverpod_generator: ^2.3.9
  riverpod_lint: ^2.3.7

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/sounds/
    - assets/fonts/
  
  fonts:
    - family: InstrumentSans
      fonts:
        - asset: assets/fonts/InstrumentSans-Regular.ttf
        - asset: assets/fonts/InstrumentSans-Bold.ttf
          weight: 700
    - family: GeistMono
      fonts:
        - asset: assets/fonts/GeistMono-Regular.ttf
